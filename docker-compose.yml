services:
  emulators:
    image: eclipse-temurin:21-jdk
    command: >
      sh -c "apt-get update && apt-get install -y curl && curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs && npm install -g firebase-tools && firebase emulators:start --project demo-local --only auth,firestore"
    ports:
      - "4000:4000"   # Emulator UI
      - "8081:8081"   # Firestore
      - "9099:9099"   # Auth
    volumes:
      - ./firebase.json:/root/firebase.json:ro
    working_dir: /root
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  server:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - GCP_PROJECT_ID=demo-local
      - FIRESTORE_EMULATOR_HOST=emulators:8081
      - FIREBASE_AUTH_EMULATOR_HOST=emulators:9099
    depends_on:
      emulators:
        condition: service_healthy
